<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Bank Kazuma</title>
</head>
<body style="margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; position: relative;">

    <div id="toast-container" style="position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; max-width: 350px; width: 100%;"></div>

    <div id="login-container" style="display: flex; flex-direction: column; min-height: 100vh; justify-content: center; align-items: center; padding: 24px; background: #ffffff; transition: background 0.3s ease;">
        <div id="login-card" style="width: 100%; max-width: 400px; background: #ffffff; padding: 40px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid #f1f3f9;">
            
            <div style="font-size: 28px; font-weight: 800; color: #6f42c1; text-align: center; margin-bottom: 8px;">Bank Kazuma</div>
            <div style="font-size: 15px; color: #666666; text-align: center; margin-bottom: 32px;">Ingresa a tu cuenta de banca en línea</div>

            <form id="form-login" onsubmit="event.preventDefault(); loguearUsuario();">
                <div style="margin-bottom: 20px;">
                    <label style="display: block; font-size: 14px; font-weight: 600; color: #333333; margin-bottom: 8px;">Usuario</label>
                    <input type="text" id="log-username" required style="width: 100%; padding: 14px; border: 2px solid #e1e5ee; border-radius: 12px; font-size: 15px; outline: none; box-sizing: border-box;">
                </div>

                <div style="margin-bottom: 32px;">
                    <label style="display: block; font-size: 14px; font-weight: 600; color: #333333; margin-bottom: 8px;">Contraseña</label>
                    <input type="password" id="log-password" required style="width: 100%; padding: 14px; border: 2px solid #e1e5ee; border-radius: 12px; font-size: 15px; outline: none; box-sizing: border-box;">
                </div>

                <button type="submit" style="background: #6f42c1; color: #ffffff; border: none; padding: 16px; font-size: 16px; font-weight: 600; border-radius: 12px; cursor: pointer; width: 100%; box-shadow: 0 4px 12px rgba(111, 66, 193, 0.2);">
                    Ingresar
                </button>
            </form>

            <div style="text-align: center; margin-top: 24px; font-size: 14px; color: #666666;">
                ¿No tienes cuenta? <span onclick="window.location.href='/signup'" style="color: #6f42c1; font-weight: 600; cursor: pointer;">Regístrate</span>
            </div>

            <div style="text-align: center; margin-top: 16px;">
                <span onclick="window.location.href='/'" style="font-size: 13px; color: #999999; cursor: pointer;">Volver al inicio</span>
            </div>
        </div>
    </div>

    <script>
    function mostrarNotificacion(mensaje, esError = true) {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        
        toast.style.background = esError ? '#fde8e8' : '#eafaf1';
        toast.style.color = esError ? '#9b1c1c' : '#14532d';
        toast.style.border = `1px solid ${esError ? '#f8b4b4' : '#84e1bc'}`;
        toast.style.padding = '16px 20px';
        toast.style.borderRadius = '12px';
        toast.style.boxShadow = '0 4px 12px rgba(0,0,0,0.08)';
        toast.style.display = 'flex';
        toast.style.justifyContent = 'space-between';
        toast.style.alignItems = 'center';
        toast.style.fontSize = '14px';
        toast.style.fontWeight = '600';
        toast.style.animation = 'fadeIn 0.3s ease forwards';
        
        const texto = document.createElement('span');
        texto.innerText = mensaje;
        toast.appendChild(texto);
        
        const botonCerrar = document.createElement('button');
        botonCerrar.innerText = '✕';
        botonCerrar.style.background = 'none';
        botonCerrar.style.border = 'none';
        botonCerrar.style.color = esError ? '#9b1c1c' : '#14532d';
        botonCerrar.style.cursor = 'pointer';
        botonCerrar.style.marginLeft = '12px';
        botonCerrar.style.fontSize = '16px';
        botonCerrar.style.fontWeight = '700';
        
        botonCerrar.onclick = () => { toast.remove(); };
        
        toast.appendChild(botonCerrar);
        container.appendChild(toast);
        
        setTimeout(() => {
            if (toast.parentNode) {
                toast.remove();
            }
        }, 5000);
    }

    (function verificarSesionActiva() {
        if (localStorage.getItem('token_kazuma')) {
            window.location.href = '/dash';
        }
    })();

    function loguearUsuario() {
        const u = document.getElementById('log-username').value;
        const p = document.getElementById('log-password').value;
        if(!u || !p) return;

        fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: u, password: p })
        })
        .then(r => r.json())
        .then(data => {
            if(data.error) {
                mostrarNotificacion(data.error, true);
            } else {
                localStorage.setItem('token_kazuma', data.token);
                mostrarNotificacion("Sesión iniciada. Redirigiendo...", false);
                setTimeout(() => {
                    window.location.href = '/dash';
                }, 1000);
            }
        })
        .catch(() => {
            mostrarNotificacion("Error de respuesta desde el servidor.", true);
        });
    }
    </script>

    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</body>
</html>
