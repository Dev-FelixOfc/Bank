<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil Público - Bank Kazuma</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; color: #111111; min-height: 100vh; }
        .navbar { background: #ffffff; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e1e5ee; }
        .logo { font-size: 22px; font-weight: 800; color: #6f42c1; letter-spacing: -0.5px; }
        .logo span { color: #111111; }
        
        .container { max-width: 500px; margin: 50px auto; padding: 0 20px; }
        .profile-card { background: #ffffff; border: 1px solid #e1e5ee; border-radius: 28px; padding: 35px; box-shadow: 0 15px 35px rgba(0,0,0,0.03); text-align: center; }
        
        .avatar-preview-wrapper { width: 120px; height: 120px; border-radius: 50%; background: #6f42c1; color: #ffffff; display: flex; justify-content: center; align-items: center; font-size: 44px; font-weight: 700; margin: 0 auto 20px auto; overflow: hidden; border: 4px solid #ffffff; box-shadow: 0 6px 16px rgba(0,0,0,0.08); }
        .avatar-preview-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        
        .user-name { font-size: 24px; font-weight: 700; color: #111111; margin-bottom: 4px; }
        .user-alias { font-size: 15px; color: #6f42c1; font-weight: 600; margin-bottom: 30px; display: inline-block; background: #f3ebff; padding: 4px 14px; border-radius: 20px; }
        
        /* Formato idéntico a las tarjetas de Fondos del Dashboard */
        .dash-card { background: linear-gradient(135deg, #6f42c1 0%, #5a32a3 100%); color: #ffffff; border-radius: 20px; padding: 24px; text-align: left; box-shadow: 0 8px 24px rgba(111, 66, 193, 0.15); margin-bottom: 20px; }
        .dash-card-label { font-size: 13px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.85; margin-bottom: 6px; font-weight: 600; }
        .dash-card-value { font-size: 32px; font-weight: 700; letter-spacing: -0.5px; }

        .info-row { background: #f8f9fa; border: 1px solid #e1e5ee; border-radius: 16px; padding: 18px; display: flex; justify-content: space-between; align-items: center; }
        .info-label { font-size: 14px; color: #666666; font-weight: 600; }
        .info-value { font-size: 16px; color: #111111; font-weight: 700; }

        .error-box { background: #fde8e8; color: #9b1c1c; border: 1px solid #f8b4b4; border-radius: 20px; padding: 30px; text-align: center; font-weight: 600; display: none; }
        .loading { font-size: 16px; color: #666666; font-weight: 600; margin-top: 40px; text-align: center; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">Bank <span>Kazuma</span></div>
    </nav>

    <div class="container">
        <div id="loading-state" class="loading">Buscando perfil en la red Kazuma...</div>

        <div id="error-container" class="error-box"></div>

        <div id="profile-container" class="profile-card" style="display: none;">
            <div class="avatar-preview-wrapper">
                <span id="preview-initials">-</span>
                <img id="preview-img" style="display: none;">
            </div>

            <div class="user-name" id="preview-name">Cargando...</div>
            <div class="user-alias" id="preview-alias">@alias</div>

            <!-- Card de Fondos estilo Dashboard -->
            <div class="dash-card">
                <div class="dash-card-label">Fondos Totales</div>
                <div class="dash-card-value" id="preview-balance">0.00 KZM</div>
            </div>

            <!-- Contador de Tarjetas Asociadas -->
            <div class="info-row">
                <div class="info-label">Tarjetas asociadas a la cuenta</div>
                <div class="info-value" id="preview-cards">0</div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Extraemos el alias directamente desde la URL de la barra de navegación
            const pathParts = window.location.pathname.split('/@');
            if (pathParts.length < 2 || !pathParts[1]) {
                mostrarError("Enlace de perfil no válido.");
                return;
            }
            
            const alias = pathParts[1];

            fetch(`/api/public/profile/${alias}`)
                .then(res => {
                    if (!res.ok) throw new Error();
                    return res.json();
                })
                .then(data => {
                    document.getElementById('loading-state').style.display = 'none';
                    
                    if (data.error) {
                        mostrarError(data.error);
                        return;
                    }

                    // Sincronizar datos visuales
                    document.getElementById('preview-name').innerText = data.username;
                    document.getElementById('preview-alias').innerText = `@${data.alias}`;
                    document.getElementById('preview-balance').innerText = `${parseFloat(data.balance).toFixed(2)} KZM`;
                    document.getElementById('preview-cards').innerText = data.cardsCount;

                    // Manejo del avatar sin permisos de edición
                    const initials = document.getElementById('preview-initials');
                    const img = document.getElementById('preview-img');
                    if (data.avatar) {
                        initials.style.display = 'none';
                        img.src = data.avatar;
                        img.style.display = 'block';
                    } else {
                        initials.innerText = data.username.substring(0, 2).toUpperCase();
                        initials.style.display = 'block';
                        img.style.display = 'none';
                    }

                    document.getElementById('profile-container').style.display = 'block';
                })
                .catch(() => {
                    mostrarError("El alias buscado no existe o no se pudo conectar con el servidor.");
                });
        });

        function mostrarError(msg) {
            document.getElementById('loading-state').style.display = 'none';
            const errBox = document.getElementById('error-container');
            errBox.innerText = msg;
            errBox.style.display = 'block';
        }
    </script>
</body>
</html>
