<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil Público - Bank Kazuma</title>
    <style>
        /* Estilos base que ya tenías + estilos para el nuevo botón y modal */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; color: #111111; min-height: 100vh; }
        .navbar { background: #ffffff; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e1e5ee; }
        .logo { font-size: 22px; font-weight: 800; color: #6f42c1; letter-spacing: -0.5px; }
        .container { max-width: 500px; margin: 50px auto; padding: 0 20px; }
        .profile-card { background: #ffffff; border: 1px solid #e1e5ee; border-radius: 28px; padding: 35px; box-shadow: 0 15px 35px rgba(0,0,0,0.03); text-align: center; }
        
        .btn-donate { background: #6f42c1; color: white; border: none; padding: 12px 24px; border-radius: 12px; font-weight: 600; cursor: pointer; margin-top: 20px; width: 100%; }
        
        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 25px; border-radius: 20px; width: 90%; max-width: 400px; position: relative; }
        .close-btn { position: absolute; top: 15px; right: 15px; cursor: pointer; font-size: 20px; }
        select, input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
    </style>
</head>
<body>

    <nav class="navbar"><div class="logo">Bank <span>Kazuma</span></div></nav>

    <div class="container">
        <div id="loading-state" class="loading">Cargando perfil...</div>
        <div id="error-container" class="error-box"></div>
        <div id="profile-container" class="profile-card" style="display: none;">
            <div class="user-name" id="preview-name"></div>
            <div class="dash-card">
                <div class="dash-card-value" id="preview-balance">0.00 KZM</div>
            </div>
            <button class="btn-donate" onclick="abrirModal()">Donar a este usuario</button>
        </div>
    </div>

    <!-- Modal Donación -->
    <div id="donate-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="cerrarModal()">&times;</span>
            <h3>Donar a <span id="target-name"></span></h3>
            <div id="modal-body">
                <label>Selecciona tu tarjeta:</label>
                <select id="user-cards"></select>
                <input type="number" id="amount" placeholder="Cantidad a enviar">
                <button class="btn-donate" onclick="procesarDonacion()">Confirmar Envío</button>
            </div>
        </div>
    </div>

    <script>
        let profileData = {}; // Guardaremos el perfil visitado

        // 1. Obtener perfil
        async function cargarPerfil() {
            const alias = window.location.pathname.split('/@')[1];
            const res = await fetch(`/api/public/profile/${alias}`);
            profileData = await res.json();
            // ... (llenar datos como ya tienes)
            document.getElementById('preview-name').innerText = profileData.username;
            document.getElementById('profile-container').style.display = 'block';
        }

        // 2. Abrir Modal con validación de sesión
        async function abrirModal() {
            const token = localStorage.getItem('token'); // Asumiendo que guardas el JWT en localStorage
            if (!token) {
                alert("Debes iniciar sesión para donar. Redirigiendo...");
                setTimeout(() => window.location.href = '/login', 2000);
                return;
            }

            // Buscar tarjetas del emisor
            const res = await fetch('/api/me', { headers: { 'Authorization': `Bearer ${token}` }});
            const myData = await res.json();
            
            // Aquí deberías filtrar tus tarjetas. Nota: necesitarás ajustar tu /api/me para que devuelva la lista de tarjetas
            const select = document.getElementById('user-cards');
            select.innerHTML = '';
            
            if (!myData.cardsCount || myData.cardsCount === 0) {
                select.innerHTML = '<option>No tienes tarjetas disponibles</option>';
            } else {
                // Suponiendo que tienes un endpoint o lógica para listar tarjetas
                myData.tarjetas.forEach(t => {
                    select.innerHTML += `<option value="${t.uid}|${t.card_number}">Tarjeta ${t.uid} (Saldo: ${t.balance})</option>`;
                });
            }
            document.getElementById('donate-modal').style.display = 'flex';
        }

        // 3. Procesar donación
        async function procesarDonacion() {
            const [uidEmisor, numTarjeta] = document.getElementById('user-cards').value.split('|');
            const cantidad = document.getElementById('amount').value;
            const token = localStorage.getItem('token');
            const userRes = await fetch('/api/me', { headers: { 'Authorization': `Bearer ${token}` }});
            const userData = await userRes.json();

            const payload = {
                tokenEmisor: userData.security_token,
                uidEmisor: uidEmisor,
                numTarjetaEmisor: numTarjeta,
                uidReceptor: profileData.id, // ID del usuario que estás visitando
                cantidad: cantidad
            };

            const res = await fetch('/api/users/transfer', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await res.json();
            if (res.ok) {
                alert("Donación exitosa!");
                cerrarModal();
            } else {
                alert("Error: " + data.error);
            }
        }

        function cerrarModal() { document.getElementById('donate-modal').style.display = 'none'; }
        window.onload = cargarPerfil;
    </script>
</body>
</html>
