<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil Público - Bank Kazuma</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; color: #111111; min-height: 100vh; }
        .navbar { background: #ffffff; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e1e5ee; }
        .logo { font-size: 22px; font-weight: 800; color: #6f42c1; letter-spacing: -0.5px; }
        .container { max-width: 500px; margin: 50px auto; padding: 0 20px; }
        .profile-card { background: #ffffff; border: 1px solid #e1e5ee; border-radius: 28px; padding: 35px; text-align: center; }
        .btn-action { background: #6f42c1; color: white; border: none; padding: 16px; border-radius: 16px; width: 100%; font-weight: 700; cursor: pointer; }
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; justify-content:center; align-items:center; }
        .modal-content { background:white; padding:30px; border-radius:20px; width:90%; max-width:400px; }
        #toast { display:none; position:fixed; top:20px; right:20px; background:white; padding:20px; border-radius:16px; box-shadow:0 10px 25px rgba(0,0,0,0.2); z-index:9999; border:1px solid #e1e5ee; }
    </style>
</head>
<body>
    <div id="toast"><span onclick="this.parentElement.style.display='none'" style="cursor:pointer; float:right;">X</span><p id="toast-text"></p></div>
    <nav class="navbar"><div class="logo">Bank <span>Kazuma</span></div></nav>
    <div class="container">
        <div id="profile-container" class="profile-card" style="display: none;">
            <div id="preview-name" style="font-size:24px; font-weight:700;"></div>
            <button class="btn-action" onclick="abrirModal()">Donar</button>
        </div>
    </div>
    <div id="donate-modal" class="modal">
        <div class="modal-content">
            <h3>Datos de Donación</h3>
            <select id="user-cards" style="width:100%; padding:10px; margin:10px 0;"></select>
            <input type="text" id="target-uid" placeholder="UID/ID Destino" style="width:100%; padding:10px; margin-bottom:10px;">
            <input type="number" id="donation-amount" placeholder="Cantidad" style="width:100%; padding:10px; margin-bottom:10px;">
            <button class="btn-action" onclick="procesarDonacion()">Enviar</button>
            <button class="btn-action" style="background:#dc3545; margin-top:10px;" onclick="document.getElementById('donate-modal').style.display='none'">Cancelar</button>
        </div>
    </div>
    <script>
        let profileData = null;
        document.addEventListener('DOMContentLoaded', async () => {
            const alias = window.location.pathname.split('/@')[1];
            const res = await fetch(`/api/public/profile/${alias}`);
            profileData = await res.json();
            document.getElementById('preview-name').innerText = profileData.username;
            document.getElementById('profile-container').style.display = 'block';
        });
        function mostrarMensaje(t) { document.getElementById('toast-text').innerText = t; document.getElementById('toast').style.display = 'block'; }
        async function abrirModal() {
            const token = localStorage.getItem('token_kazuma');
            if (!token) return mostrarMensaje("Inicia sesión.");
            const res = await fetch('/api/users/me', { headers: { 'Authorization': `Bearer ${token}` }});
            const miData = await res.json();
            const select = document.getElementById('user-cards');
            select.innerHTML = '';
            miData.tarjetas.forEach(t => { select.innerHTML += `<option value="${t.uid}|${t.card_number}">Tarjeta ${t.uid}</option>`; });
            document.getElementById('donate-modal').style.display = 'flex';
        }
        async function procesarDonacion() {
            const token = localStorage.getItem('token_kazuma');
            const [uidEmisor, numTarjeta] = document.getElementById('user-cards').value.split('|');
            const cantidad = document.getElementById('donation-amount').value;
            const uidDestino = document.getElementById('target-uid').value;
            const miRes = await fetch('/api/users/me', { headers: { 'Authorization': `Bearer ${token}` }});
            const miData = await miRes.json();
            const res = await fetch('/api/users/transfer', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ tokenEmisor: miData.security_token, uidEmisor, numTarjetaEmisor: numTarjeta, uidReceptor: uidDestino, cantidad })
            });
            const data = await res.json();
            if (res.ok) { mostrarMensaje("Éxito"); setTimeout(() => location.reload(), 1000); } else { mostrarMensaje(data.error); }
        }
    </script>
</body>
</html>
