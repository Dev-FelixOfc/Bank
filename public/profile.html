<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - Bank Kazuma</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; color: #111111; min-height: 100vh; }
        .navbar { background: #ffffff; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e1e5ee; }
        .logo { font-size: 22px; font-weight: 800; color: #6f42c1; letter-spacing: -0.5px; cursor: pointer; }
        .logo span { color: #111111; }
        .container { max-width: 600px; margin: 40px auto; padding: 0 24px; }
        .box { background: #ffffff; border: 1px solid #e1e5ee; border-radius: 24px; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.02); }
        
        .avatar-container { display: flex; flex-direction: column; align-items: center; margin-bottom: 32px; position: relative; }
        .avatar-wrapper { width: 110px; height: 110px; border-radius: 50%; background: #6f42c1; color: #ffffff; display: flex; justify-content: center; align-items: center; font-size: 40px; font-weight: 700; cursor: pointer; overflow: hidden; border: 4px solid #ffffff; box-shadow: 0 4px 14px rgba(0,0,0,0.1); position: relative; transition: transform 0.2s; }
        .avatar-wrapper:hover { transform: scale(1.03); }
        .avatar-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        .avatar-upload-text { font-size: 12px; color: #6f42c1; font-weight: 600; margin-top: 8px; cursor: pointer; }
        #file-input { display: none; }

        .form-group { margin-bottom: 24px; position: relative; }
        label { display: block; font-size: 14px; font-weight: 600; color: #333333; margin-bottom: 8px; }
        input[type="text"], input[type="email"], input[type="password"] { width: 100%; padding: 14px; border: 2px solid #e1e5ee; border-radius: 12px; font-size: 15px; outline: none; box-sizing: border-box; background: #ffffff; padding-right: 45px; }
        
        .eye-icon { position: absolute; right: 15px; top: 40px; cursor: pointer; font-size: 18px; color: #999999; user-select: none; }
        .btn-save { background: #6f42c1; color: #ffffff; border: none; padding: 16px; font-size: 16px; font-weight: 600; border-radius: 12px; cursor: pointer; width: 100%; box-shadow: 0 4px 12px rgba(111, 66, 193, 0.2); transition: background 0.2s; }
        .btn-save:hover { background: #5a32a3; }
        .link-back { display: block; text-align: center; margin-top: 20px; font-size: 14px; color: #999999; cursor: pointer; text-decoration: none; }
    </style>
</head>
<body>

    <div id="toast-container" style="position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; max-width: 350px; width: 100%;"></div>

    <nav class="navbar">
        <div class="logo" onclick="window.location.href='/dash'">Bank <span>Kazuma</span></div>
    </nav>

    <div class="container">
        <div class="box">
            
            <div class="avatar-container">
                <div class="avatar-wrapper" id="avatarBg" onclick="triggerFileInput()">
                    <span id="avatarInitials">U</span>
                    <img id="avatarImg" style="display: none;">
                </div>
                <div class="avatar-upload-text" onclick="triggerFileInput()">Cambiar foto de perfil</div>
                <input type="file" id="file-input" accept="image/*" onchange="subirAvatarServidor(this)">
            </div>

            <div class="form-group">
                <label>Nombre de usuario</label>
                <input type="text" id="prof-username">
            </div>

            <div class="form-group">
                <label>Correo electrónico</label>
                <input type="email" id="prof-email">
            </div>

            <div class="form-group">
                <label>Alias único de la red (Para tu ruta /@alias)</label>
                <input type="text" id="prof-alias" placeholder="ejemplo-alias_99">
            </div>

            <hr style="border: 0; border-top: 1px solid #e1e5ee; margin: 32px 0;">

            <div class="form-group">
                <label>Contraseña actual (Para aplicar cambios)</label>
                <input type="password" id="prof-password-curr" placeholder="Obligatoria para cambios de seguridad">
                <span class="eye-icon" onclick="togglePassVisibility('prof-password-curr')">👁️</span>
            </div>

            <div class="form-group">
                <label>Nueva contraseña (Opcional)</label>
                <input type="password" id="prof-password-new" placeholder="Dejar en blanco si no deseas cambiarla">
                <span class="eye-icon" onclick="togglePassVisibility('prof-password-new')">👁️</span>
            </div>

            <button class="btn-save" onclick="actualizarPerfil()">Guardar Cambios</button>
            <a class="link-back" href="/dash">Volver al panel principal</a>
        </div>
    </div>

    <script>
        function mostrarNotificacion(mensaje, esError = true) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.style.background = esError ? '#fde8e8' : '#eafaf1';
            toast.style.color = esError ? '#9b1c1c' : '#14532d';
            toast.style.border = `1px solid ${esError ? '#f8b4b4' : '#84e1bc'}`;
            toast.style.padding = '16px 20px';
            toast.style.borderRadius = '12px';
            toast.style.boxShadow = '0 4px 12px rgba(0,0,0,0.08)';
            toast.style.display = 'flex';
            toast.style.justifyContent = 'space-between';
            toast.style.alignItems = 'center';
            toast.style.fontSize = '14px';
            toast.style.fontWeight = '600';
            toast.style.animation = 'fadeIn 0.3s ease forwards';
            
            const texto = document.createElement('span');
            texto.innerText = mensaje;
            toast.appendChild(texto);
            
            const botonCerrar = document.createElement('button');
            botonCerrar.innerText = '✕';
            botonCerrar.style.background = 'none';
            botonCerrar.style.border = 'none';
            botonCerrar.style.color = esError ? '#9b1c1c' : '#14532d';
            botonCerrar.style.cursor = 'pointer';
            botonCerrar.style.marginLeft = '12px';
            botonCerrar.style.fontSize = '16px';
            botonCerrar.style.fontWeight = '700';
            botonCerrar.onclick = () => toast.remove();
            
            toast.appendChild(botonCerrar);
            container.appendChild(toast);
            setTimeout(() => { if (toast.parentNode) toast.remove(); }, 5000);
        }

        function triggerFileInput() {
            document.getElementById('file-input').click();
        }

        function togglePassVisibility(id) {
            const el = document.getElementById(id);
            el.type = el.type === 'password' ? 'text' : 'password';
        }

        function manejarUIIden(username, avatarUrl) {
            const initialsSpan = document.getElementById('avatarInitials');
            const imgEl = document.getElementById('avatarImg');
            
            if (username) {
                initialsSpan.innerText = username.substring(0, 2).toUpperCase();
            }
            if (avatarUrl) {
                initialsSpan.style.display = 'none';
                imgEl.src = avatarUrl;
                imgEl.style.display = 'block';
            } else {
                initialsSpan.style.display = 'block';
                imgEl.style.display = 'none';
            }
        }

        function cargarDatosPerfil() {
            const token = localStorage.getItem('token_kazuma');
            if (!token) { window.location.href = '/login'; return; }

            fetch('/api/users/me', {
                headers: { 'Authorization': `Bearer ${token}` }
            })
            .then(res => res.json())
            .then(data => {
                if (data.username) {
                    document.getElementById('prof-username').value = data.username;
                    document.getElementById('prof-email').value = data.email || '';
                    document.getElementById('prof-alias').value = data.alias || '';
                    manejarUIIden(data.username, data.avatar);
                }
            })
            .catch(() => window.location.href = '/login');
        }

        function subirAvatarServidor(input) {
            if (!input.files || !input.files[0]) return;
            
            const formData = new FormData();
            formData.append('file', input.files[0]);

            mostrarNotificacion("Subiendo imagen al host remoto...", false);

            fetch('https://upload.yotsuba.giize.com/upload', {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                if (data.url) {
                    actualizarAvatarEnBD(data.url);
                } else {
                    mostrarNotificacion("El host remoto no retorno una URL valida.", true);
                }
            })
            .catch(() => {
                mostrarNotificacion("Error al conectar con upload.yotsuba.giize.com", true);
            });
        }

        function actualizarAvatarEnBD(urlImagen) {
            const token = localStorage.getItem('token_kazuma');
            fetch('/api/users/profile/avatar', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ avatar: urlImagen })
            })
            .then(res => res.json())
            .then(data => {
                if(data.error) {
                    mostrarNotificacion(data.error, true);
                } else {
                    mostrarNotificacion("Foto de perfil actualizada exitosamente.", false);
                    document.getElementById('avatarInitials').style.display = 'none';
                    const img = document.getElementById('avatarImg');
                    img.src = urlImagen;
                    img.style.display = 'block';
                }
            })
            .catch(() => mostrarNotificacion("Error al vincular el avatar en tu cuenta.", true));
        }

        function actualizarPerfil() {
            const token = localStorage.getItem('token_kazuma');
            const username = document.getElementById('prof-username').value.trim();
            const email = document.getElementById('prof-email').value.trim();
            const alias = document.getElementById('prof-alias').value.trim();
            const passwordCurr = document.getElementById('prof-password-curr').value;
            const passwordNew = document.getElementById('prof-password-new').value;

            if (!passwordCurr) {
                mostrarNotificacion("Debes proveer tu contrasena actual para confirmar cambios.", true);
                return;
            }

            if (alias.includes('@') || alias.includes('#')) {
                mostrarNotificacion("El alias no puede contener los caracteres @ ni #", true);
                return;
            }

            const regex = /^[a-zA-Z0-9_ -]*$/;
            if (!regex.test(alias)) {
                mostrarNotificacion("El alias contiene caracteres especiales invalidos.", true);
                return;
            }

            fetch('/api/users/profile/update', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    username,
                    email,
                    alias,
                    passwordCurr,
                    passwordNew
                })
            })
            .then(res => res.json())
            .then(data => {
                if (data.error) {
                    mostrarNotificacion(data.error, true);
                } else {
                    mostrarNotificacion("¡Datos de perfil sincronizados!", false);
                    document.getElementById('prof-password-curr').value = '';
                    document.getElementById('prof-password-new').value = '';
                    cargarDatosPerfil();
                }
            })
            .catch(() => mostrarNotificacion("No se pudo conectar con el backend de perfiles.", true));
        }

        document.addEventListener('DOMContentLoaded', cargarDatosPerfil);
    </script>
    <style>@keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }</style>
</body>
</html>
