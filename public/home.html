<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Kazuma</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            overflow: hidden;
            background-color: #ffffff;
        }
        #app-viewport {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
    </style>
</head>
<body>

    <div id="app-viewport"></div>

    <script>
        function cargarVista(archivoHtml, urlEstetica) {
            fetch(archivoHtml)
                .then(response => response.text())
                .then(html => {
                    document.getElementById('app-viewport').innerHTML = html;
                    if (urlEstetica) {
                        history.pushState({}, '', urlEstetica);
                    }
                })
                .catch(err => console.error("Error al cargar la interfaz:", err));
        }

        function manejarRutaInicial() {
            const ruta = window.location.pathname;
            if (ruta === '/signup') {
                cargarVista('/register.html');
            } else if (ruta === '/login') {
                cargarVista('/login.html');
            } else {
                cargarVista('/home.html');
            }
        }

        window.addEventListener('popstate', manejarRutaInicial);
        window.addEventListener('DOMContentLoaded', manejarRutaInicial);
    </script>
</body>
</html>
