<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Tarjetas - Bank Kazuma</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; color: #111111; min-height: 100vh; display: flex; flex-direction: column; }
        .navbar { background: #ffffff; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e1e5ee; position: relative; z-index: 100; }
        .nav-left { display: flex; align-items: center; gap: 16px; }
        .menu-btn { background: none; border: none; font-size: 22px; color: #111111; cursor: pointer; padding: 4px; }
        .logo { font-size: 22px; font-weight: 800; color: #6f42c1; letter-spacing: -0.5px; cursor: pointer; }
        .sidebar { position: fixed; top: 0; left: -250px; width: 250px; height: 100%; background: #ffffff; box-shadow: 4px 0 15px rgba(0,0,0,0.05); transition: left 0.3s ease; z-index: 99; padding-top: 80px; }
        .sidebar.active { left: 0; }
        .sidebar-menu { list-style: none; display: flex; flex-direction: column; gap: 8px; padding: 0 16px; }
        .sidebar-item { display: flex; align-items: center; gap: 12px; padding: 14px 16px; color: #333333; text-decoration: none; font-weight: 600; border-radius: 12px; cursor: pointer; }
        .sidebar-item:hover { background: #f3ebff; color: #6f42c1; }
        
        /* Modal Estilos */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 24px; border-radius: 20px; width: 300px; text-align: center; }
        .modal-content input { width: 100%; padding: 10px; margin: 15px 0; border: 1px solid #ddd; border-radius: 8px; }
        .btn-del { background: #dc3545; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; width: 100%; }

        .container { max-width: 900px; width: 100%; margin: 40px auto; padding: 0 24px; text-align: center; flex: 1; }
        .header-panel { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
        .counter-badge { background: #6f42c1; color: #ffffff; padding: 6px 14px; border-radius: 20px; font-weight: 700; }
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; }
        .visual-card { background: linear-gradient(135deg, #bf953f 0%, #fcf6ba 25%, #b38728 50%, #fbf5b7 75%, #aa771c 100%); color: #111111; padding: 24px; border-radius: 20px; height: 200px; display: flex; flex-direction: column; justify-content: space-between; text-align: left; }
        .card-number { font-size: 18px; font-weight: 700; font-family: monospace; margin: 15px 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.2); display: none; z-index: 98; }
        .overlay.active { display: block; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-left">
            <button class="menu-btn" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></button>
            <div class="logo" onclick="window.location.href='/dash'">Bank <span>Kazuma</span></div>
        </div>
    </nav>

    <div class="overlay" id="menuOverlay" onclick="toggleMenu()"></div>

    <div class="modal" id="deleteModal">
        <div class="modal-content">
            <h3>Eliminar Tarjeta</h3>
            <input type="text" id="uidInput" placeholder="Ingresa el UID de la tarjeta">
            <button class="btn-del" onclick="eliminarTarjeta()">Confirmar Borrado</button>
            <button onclick="document.getElementById('deleteModal').style.display='none'" style="background:none; border:none; margin-top:10px; cursor:pointer;">Cancelar</button>
        </div>
    </div>

    <div class="sidebar" id="sidebarMenu">
        <ul class="sidebar-menu">
            <li><a href="/dash" class="sidebar-item"><i class="fa-solid fa-house"></i>Inicio</a></li>
            <li><a href="/create-card" class="sidebar-item"><i class="fa-solid fa-plus"></i>Crear Tarjeta</a></li>
            <li><a class="sidebar-item" onclick="document.getElementById('deleteModal').style.display='flex'; toggleMenu()"><i class="fa-solid fa-trash"></i>Eliminar Tarjeta</a></li>
        </ul>
    </div>

    <div class="container">
        <div class="header-panel">
            <h1>Mis Tarjetas Virtuales</h1>
            <div class="counter-badge" id="lblCounter">0 / 3</div>
        </div>
        <div class="cards-grid" id="cardsContainer"></div>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById('sidebarMenu').classList.toggle('active');
            document.getElementById('menuOverlay').classList.toggle('active');
        }

        function eliminarTarjeta() {
            const uid = document.getElementById('uidInput').value;
            const token = localStorage.getItem('token_kazuma');
            
            fetch(`/api/cards/delete/${uid}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            })
            .then(res => res.json())
            .then(data => {
                alert(data.message || data.error);
                location.reload();
            });
        }

        function cargarTarjetas() {
            const token = localStorage.getItem('token_kazuma');
            fetch('/api/cards', { headers: { 'Authorization': `Bearer ${token}` } })
            .then(res => res.json())
            .then(data => {
                document.getElementById('lblCounter').innerText = `${data.total || 0} / 3`;
                const container = document.getElementById('cardsContainer');
                container.innerHTML = "";
                data.tarjetas.forEach(t => {
                    const inicial = t.username_dueno ? t.username_dueno.charAt(0).toUpperCase() : '?';
                    const avatar = t.avatar && t.avatar.length > 5 ? `<img src="${t.avatar}" class="card-avatar">` : `<div class="card-avatar" style="display:flex; align-items:center; justify-content:center; background:#111; color:#fff; font-weight:bold;">${inicial}</div>`;
                    container.innerHTML += `
                        <div class="visual-card">
                            <div class="card-top"><div>KAZUMA CARD</div>${avatar}</div>
                            <div class="card-number">${t.card_number}</div>
                            <div class="card-bottom">
                                <div><small>TITULAR</small><br><b>${t.username_dueno}</b></div>
                                <div style="text-align:right;"><small>UID: ${t.uid}</small></div>
                            </div>
                        </div>`;
                });
            });
        }
        document.addEventListener('DOMContentLoaded', cargarTarjetas);
    </script>
</body>
</html>
