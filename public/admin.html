<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - Bank Kazuma</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Estilos base consistentes con tu diseño */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; color: #111111; min-height: 100vh; }
        
        /* Pantalla negra de protección */
        #blackScreen { position: fixed; top:0; left:0; width:100%; height:100%; background: #000; z-index: 9999; }
        
        .container { max-width: 900px; margin: 40px auto; padding: 24px; }
        h1 { margin-bottom: 20px; font-weight: 800; }

        /* Buscador */
        #search { width: 100%; padding: 12px; border: 1px solid #e1e5ee; border-radius: 10px; margin-bottom: 20px; font-size: 14px; }

        /* Tabla Estilo Kazuma */
        .admin-table { width: 100%; border-collapse: collapse; background: #ffffff; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        th { background: #f3ebff; color: #6f42c1; padding: 15px; text-align: left; }
        td { padding: 15px; border-bottom: 1px solid #e1e5ee; }
        
        .btn-act { background: #6f42c1; color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .locked { background: #ccc; cursor: not-allowed; }

        /* Modal igual al que ya usas */
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.4); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 24px; border-radius: 20px; width: 90%; max-width: 320px; text-align: center; }
        .modal-content input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #e1e5ee; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="blackScreen"></div>

    <div class="container" id="adminContent" style="display:none;">
        <h1>Panel de Administración</h1>
        <input type="text" id="search" placeholder="Buscar por usuario, correo o rol..." onkeyup="filtrar()">
        
        <table class="admin-table">
            <thead>
                <tr>
                    <th>Usuario</th>
                    <th>Correo</th>
                    <th>Rol</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="userBody"></tbody>
        </table>
    </div>

    <script>
        // Protección de acceso y carga
        fetch('/api/admin/users', { 
            headers: { 'Authorization': `Bearer ${localStorage.getItem('token_kazuma')}` } 
        })
        .then(res => {
            if(!res.ok) window.location.href = '/dash';
            return res.json();
        })
        .then(users => {
            document.getElementById('blackScreen').style.display = 'none';
            document.getElementById('adminContent').style.display = 'block';
            renderizar(users);
        });

        function renderizar(users) {
            const body = document.getElementById('userBody');
            body.innerHTML = users.map(u => `
                <tr>
                    <td>${u.username}</td>
                    <td>${u.email} ${u.email === 'frasesbebor@gmail.com' ? '🔒' : ''}</td>
                    <td>${u.rol}</td>
                    <td>
                        <button class="btn-act ${u.email === 'frasesbebor@gmail.com' ? 'locked' : ''}" 
                                ${u.email === 'frasesbebor@gmail.com' ? 'disabled' : ''}
                                onclick="alert('Acción de Rol')">Rol</button>
                        <button class="btn-act" onclick="alert('Acción de Dinero para ${u.uid}')">Dinero</button>
                    </td>
                </tr>
            `).join('');
        }

        function filtrar() {
            const val = document.getElementById('search').value.toLowerCase();
            const rows = document.querySelectorAll('#userBody tr');
            rows.forEach(r => r.style.display = r.innerText.toLowerCase().includes(val) ? '' : 'none');
        }
    </script>
</body>
</html>
