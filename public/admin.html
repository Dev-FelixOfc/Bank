<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - Bank Kazuma</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; color: #111111; min-height: 100vh; }
        #blackScreen { position: fixed; top:0; left:0; width:100%; height:100%; background: #000; z-index: 9999; }
        
        .container { max-width: 900px; margin: 40px auto; padding: 24px; }
        .header-panel { margin-bottom: 32px; }
        
        /* Estilo de Tarjeta de Usuario (estilo Kazuma) */
        .user-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .user-card { background: #ffffff; padding: 20px; border-radius: 20px; border: 1px solid #e1e5ee; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .user-info { margin-bottom: 15px; }
        .user-name { font-weight: 800; font-size: 18px; color: #6f42c1; }
        .user-email { font-size: 13px; color: #666; margin-bottom: 10px; }
        
        /* Botones estilo Kazuma */
        .btn-group { display: flex; gap: 10px; }
        .btn-kazuma { flex: 1; border: none; padding: 10px; border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-role { background: #f3ebff; color: #6f42c1; }
        .btn-money { background: #6f42c1; color: #ffffff; }
        .locked { background: #eee; color: #999; cursor: not-allowed; }
    </style>
</head>
<body>
    <div id="blackScreen"></div>

    <div class="container" id="adminContent" style="display:none;">
        <div class="header-panel">
            <h1>Panel Administrativo</h1>
            <input type="text" id="search" placeholder="Buscar usuario..." onkeyup="filtrar()" style="margin-top:15px; width:100%; padding:12px; border-radius:10px; border:1px solid #ddd;">
        </div>
        
        <div class="user-grid" id="userContainer"></div>
    </div>

    <script>
        fetch('/api/admin/users', { headers: { 'Authorization': `Bearer ${localStorage.getItem('token_kazuma')}` } })
        .then(res => { if(!res.ok) window.location.href = '/dash'; return res.json(); })
        .then(users => {
            document.getElementById('blackScreen').style.display = 'none';
            document.getElementById('adminContent').style.display = 'block';
            renderizar(users);
        });

        function renderizar(users) {
            const cont = document.getElementById('userContainer');
            cont.innerHTML = users.map(u => `
                <div class="user-card">
                    <div class="user-info">
                        <div class="user-name">${u.username} ${u.email === 'frasesbebor@gmail.com' ? '🔒' : ''}</div>
                        <div class="user-email">${u.email}</div>
                        <div style="font-size: 12px; font-weight: bold;">Rol: ${u.rol.toUpperCase()}</div>
                    </div>
                    <div class="btn-group">
                        <button class="btn-kazuma btn-role ${u.email === 'frasesbebor@gmail.com' ? 'locked' : ''}" 
                                ${u.email === 'frasesbebor@gmail.com' ? 'disabled' : ''}>Rol</button>
                        <button class="btn-kazuma btn-money">Dinero</button>
                    </div>
                </div>
            `).join('');
        }

        function filtrar() {
            const val = document.getElementById('search').value.toLowerCase();
            document.querySelectorAll('.user-card').forEach(c => c.style.display = c.innerText.toLowerCase().includes(val) ? '' : 'none');
        }
    </script>
</body>
</html>
