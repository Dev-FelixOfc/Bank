<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Admin - Bank Kazuma</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; margin: 0; }
        .container { max-width: 900px; margin: 40px auto; padding: 24px; }
        .user-card { background: white; border: 1px solid #e1e5ee; border-radius: 20px; padding: 20px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .search-input { width: 100%; padding: 16px; border: 1px solid #e1e5ee; border-radius: 16px; margin-bottom: 24px; }
        
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; position: relative; }
        .close-btn { position: absolute; top: 20px; right: 20px; cursor: pointer; font-size: 20px; }
        
        .btn-main { background: #6f42c1; color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; margin-top: 10px; cursor: pointer; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #e1e5ee; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container" id="adminApp" style="display:none;">
    <h1>Panel de Administración</h1>
    <input type="text" id="search" class="search-input" placeholder="Buscar por email..." onkeyup="filtrar()">
    <div id="userList"></div>
</div>

<!-- Modal Usuario -->
<div class="modal" id="userModal">
    <div class="modal-content">
        <i class="fa-solid fa-xmark close-btn" onclick="cerrar('userModal')"></i>
        <h3>Configurar Usuario</h3>
        <input type="text" id="editNombre" placeholder="Nombre">
        <select id="editRol"><option value="user">Usuario</option><option value="admin">Administrador</option></select>
        <input type="password" id="editPass" placeholder="Nueva Contraseña">
        <button class="btn-main" onclick="guardarUser()">Guardar Cambios</button>
    </div>
</div>

<!-- Modal Tarjeta -->
<div class="modal" id="cardModal">
    <div class="modal-content">
        <i class="fa-solid fa-xmark close-btn" onclick="cerrar('cardModal')"></i>
        <h3>Gestionar Tarjeta</h3>
        <input type="text" id="cardUid" placeholder="UID de Tarjeta">
        <input type="number" id="cardBalance" placeholder="Nuevo Balance (Solo números)" min="0">
        <button class="btn-main" onclick="guardarCard()">Guardar Cambios</button>
        <button class="btn-main" style="background:#dc3545;" onclick="eliminarCard()">Eliminar Tarjeta</button>
    </div>
</div>

<script>
    // Seguridad y Carga
    async function init() {
        const token = localStorage.getItem('token_kazuma');
        try {
            const res = await fetch('/api/admin/users', { headers: { 'Authorization': `Bearer ${token}` }});
            if (res.status !== 200) throw new Error();
            document.getElementById('adminApp').style.display = 'block';
            renderUsers(token);
        } catch (e) {
            document.body.innerHTML = '<div style="background:#000; height:100vh;"></div>';
            window.location.href = '/';
        }
    }

    async function renderUsers(token) {
        const res = await fetch('/api/admin/users', { headers: { 'Authorization': `Bearer ${token}` }});
        const users = await res.json();
        const list = document.getElementById('userList');
        list.innerHTML = users.map(u => `
            <div class="user-card" data-email="${u.email}">
                <span>${u.email}</span>
                <div>
                    ${u.email === 'frasesbebor@gmail.com' 
                        ? '<i class="fa-solid fa-lock"></i>' 
                        : `<i class="fa-solid fa-gear" style="cursor:pointer; margin-right:15px;" onclick="abrir('userModal')"></i>`}
                    <i class="fa-solid fa-credit-card" style="cursor:pointer;" onclick="abrir('cardModal')"></i>
                </div>
            </div>
        `).join('');
    }

    function abrir(id) { document.getElementById(id).style.display = 'flex'; }
    function cerrar(id) { document.getElementById(id).style.display = 'none'; }
    function filtrar() { /* Tu lógica de filtrado aquí */ }

    init();
</script>
</body>
</html>
