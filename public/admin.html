<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Bank Kazuma</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; color: #111111; min-height: 100vh; }
        .container { max-width: 900px; width: 100%; margin: 40px auto; padding: 0 24px; }
        .header-panel { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
        .header-panel h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; }
        .search-input { width: 100%; padding: 16px; border: 1px solid #e1e5ee; border-radius: 16px; margin-bottom: 24px; font-size: 16px; }
        .user-card { background: #ffffff; border: 1px solid #e1e5ee; padding: 20px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .actions { display: flex; gap: 12px; }
        .icon-btn { cursor: pointer; font-size: 18px; color: #6f42c1; padding: 10px; border-radius: 12px; transition: background 0.2s; }
        .icon-btn:hover { background: #f3ebff; }
        .lock-icon { color: #111111; padding: 10px; font-size: 18px; }
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.4); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 24px; border-radius: 20px; width: 90%; max-width: 350px; position: relative; }
        .modal-content input, .modal-content select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #e1e5ee; border-radius: 10px; }
        .btn-action { background: #6f42c1; color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; cursor: pointer; font-weight: 600; margin-top: 10px; }
        .close-x { position: absolute; top: 15px; right: 15px; cursor: pointer; font-size: 18px; }
    </style>
</head>
<body>

<div id="app" style="display:none;">
    <div class="container">
        <div class="header-panel"><h1>Panel de Administración</h1></div>
        <input type="text" id="searchBar" class="search-input" placeholder="Buscar por email..." onkeyup="filtrar()">
        <div id="userList"></div>
    </div>
</div>

<div class="modal" id="configModal">
    <div class="modal-content">
        <i class="fa-solid fa-xmark close-x" onclick="cerrar('configModal')"></i>
        <h3>Configuración Usuario</h3>
        <input type="text" id="editNombre" placeholder="Nombre">
        <input type="password" id="editPass" placeholder="Nueva Contraseña">
        <select id="editRol"><option value="user">Usuario</option><option value="admin">Administrador</option></select>
        <button class="btn-action" onclick="guardarUser()">Guardar Cambios</button>
    </div>
</div>

<div class="modal" id="cardModal">
    <div class="modal-content">
        <i class="fa-solid fa-xmark close-x" onclick="cerrar('cardModal')"></i>
        <h3>Gestionar Tarjeta</h3>
        <input type="text" id="editUid" placeholder="UID de Tarjeta">
        <input type="number" id="editBalance" placeholder="Monto (Solo números)">
        <button class="btn-action" onclick="guardarBalance()">Guardar Cambios</button>
        <button class="btn-action" style="background:#dc3545" onclick="eliminarTarjeta()">Eliminar Tarjeta</button>
    </div>
</div>

<script>
    let activeUserId = null;
    const token = localStorage.getItem('token_kazuma');

    async function checkAccess() {
        try {
            const res = await fetch('/api/admin/users', { headers: { 'Authorization': `Bearer ${token}` }});
            if (res.status !== 200) throw new Error();
            document.getElementById('app').style.display = 'block';
            renderList();
        } catch (e) {
            document.body.innerHTML = '<div style="background:#000; position:fixed; width:100%; height:100%;"></div>';
            window.location.href = '/';
        }
    }

    async function renderList() {
        const res = await fetch('/api/admin/users', { headers: { 'Authorization': `Bearer ${token}` }});
        const users = await res.json();
        const container = document.getElementById('userList');
        container.innerHTML = users.map(u => `
            <div class="user-card" data-email="${u.email}">
                <span>${u.email}</span>
                <div class="actions">
                    ${u.email === 'frasesbebor@gmail.com' ? '<i class="fa-solid fa-lock lock-icon"></i>' : `<i class="fa-solid fa-gear icon-btn" onclick="abrir('configModal','${u.id}')"></i>`}
                    <i class="fa-solid fa-credit-card icon-btn" onclick="abrir('cardModal','${u.id}')"></i>
                </div>
            </div>
        `).join('');
    }

    function abrir(id, userId) { activeUserId = userId; document.getElementById(id).style.display = 'flex'; }
    function cerrar(id) { document.getElementById(id).style.display = 'none'; }

    async function guardarUser() {
        const res = await fetch('/api/admin/user/role', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
            body: JSON.stringify({ userId: activeUserId, newRole: document.getElementById('editRol').value })
        });
        const d = await res.json();
        alert(d.message || d.error);
        location.reload();
    }

    async function guardarBalance() {
        const res = await fetch('/api/admin/card/balance', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
            body: JSON.stringify({ uid: document.getElementById('editUid').value, amount: document.getElementById('editBalance').value })
        });
        const d = await res.json();
        alert(d.message || d.error);
        location.reload();
    }

    async function eliminarTarjeta() {
        const res = await fetch(`/api/admin/card/${document.getElementById('editUid').value}`, {
            method: 'DELETE',
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const d = await res.json();
        alert(d.message || d.error);
        location.reload();
    }

    function filtrar() {
        const v = document.getElementById('searchBar').value.toLowerCase();
        document.querySelectorAll('.user-card').forEach(c => c.style.display = c.dataset.email.includes(v) ? 'flex' : 'none');
    }

    checkAccess();
</script>
</body>
</html>
