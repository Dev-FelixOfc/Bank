<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Control - Bank Kazuma</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; padding: 20px; }
        .hidden-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; }
        .admin-panel { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .user-row { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #eee; align-items: center; }
        .actions i { cursor: pointer; margin-left: 15px; font-size: 18px; color: #6f42c1; }
        .fa-lock { color: #dc3545 !important; cursor: default !important; }
        #searchBar { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #e1e5ee; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="app" style="display:none;">
        <div class="admin-panel">
            <h1>Panel de Administración</h1>
            <input type="text" id="searchBar" placeholder="Buscar usuario..." onkeyup="filtrar()">
            <div id="userList"></div>
        </div>
    </div>

    <script>
        // 1. SEGURIDAD AUTOMÁTICA
        async function checkAccess() {
            const token = localStorage.getItem('token_kazuma');
            try {
                const res = await fetch('/api/admin/users', { headers: { 'Authorization': `Bearer ${token}` }});
                if (res.status !== 200) throw new Error();
                document.getElementById('app').style.display = 'block';
                cargarUsuarios(token);
            } catch (e) {
                document.body.innerHTML = '<div class="hidden-screen"></div>';
                window.location.href = '/';
            }
        }

        // 2. LISTAR USUARIOS
        async function cargarUsuarios(token) {
            const res = await fetch('/api/admin/users', { headers: { 'Authorization': `Bearer ${token}` }});
            const users = await res.json();
            const list = document.getElementById('userList');
            list.innerHTML = users.map(u => `
                <div class="user-row" data-email="${u.email}">
                    <span>${u.email}</span>
                    <div class="actions">
                        ${u.email === 'frasesbebor@gmail.com' 
                            ? '<i class="fa-solid fa-lock"></i>' 
                            : `<i class="fa-solid fa-gear" onclick="editarUser('${u.id}')"></i>
                               <i class="fa-solid fa-credit-card" onclick="editarCard('${u.id}')"></i>`}
                    </div>
                </div>
            `).join('');
        }

        // 3. BUSCADOR
        function filtrar() {
            const val = document.getElementById('searchBar').value.toLowerCase();
            document.querySelectorAll('.user-row').forEach(row => {
                row.style.display = row.dataset.email.includes(val) ? 'flex' : 'none';
            });
        }

        // FUNCIONES DE EDICIÓN (Lógica de tus peticiones)
        function editarUser(id) { alert("Abrir modal de edición para: " + id); }
        function editarCard(id) { alert("Abrir configuración de tarjeta para: " + id); }

        checkAccess();
    </script>
</body>
</html>
