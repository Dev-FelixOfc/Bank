<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mis Tarjetas - Bank Kazuma</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; color: #111111; min-height: 100vh; }
        .navbar { background: #ffffff; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e1e5ee; position: relative; z-index: 100; }
        .menu-btn { background: none; border: none; font-size: 22px; cursor: pointer; }
        .logo { font-size: 22px; font-weight: 800; color: #6f42c1; cursor: pointer; }
        .sidebar { position: fixed; top: 0; left: -250px; width: 250px; height: 100%; background: #ffffff; box-shadow: 4px 0 15px rgba(0,0,0,0.05); transition: 0.3s; padding-top: 80px; z-index: 99; }
        .sidebar.active { left: 0; }
        .sidebar-item { display: flex; align-items: center; gap: 12px; padding: 14px 20px; color: #333; text-decoration: none; font-weight: 600; }
        .sidebar-item:hover { background: #f3ebff; color: #6f42c1; }
        .container { max-width: 900px; margin: 40px auto; padding: 0 24px; text-align: center; }
        .header-panel { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
        .counter-badge { background: #6f42c1; color: #ffffff; padding: 6px 14px; border-radius: 20px; font-weight: 700; }
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; }
        .visual-card { background: linear-gradient(135deg, #bf953f, #aa771c); color: #111; padding: 24px; border-radius: 20px; height: 200px; display: flex; flex-direction: column; justify-content: space-between; text-align: left; }
        .card-number { font-size: 18px; font-weight: 700; font-family: monospace; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div style="display:flex; align-items:center; gap:16px;">
            <button class="menu-btn" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></button>
            <div class="logo" onclick="window.location.href='/dash'">Bank <span>Kazuma</span></div>
        </div>
    </nav>

    <div class="sidebar" id="sidebarMenu">
        <a href="/dash" class="sidebar-item"><i class="fa-solid fa-house"></i>Inicio</a>
        <a href="/create-card" class="sidebar-item"><i class="fa-solid fa-plus"></i>Crear Tarjeta</a>
    </div>

    <div class="container">
        <div class="header-panel">
            <h1>Mis Tarjetas</h1>
            <div class="counter-badge" id="lblCounter">0 / 3</div>
        </div>
        <div class="cards-grid" id="cardsContainer"></div>
    </div>

    <script>
        function toggleMenu() { document.getElementById('sidebarMenu').classList.toggle('active'); }
        
        fetch('/api/cards', { headers: { 'Authorization': `Bearer ${localStorage.getItem('token_kazuma')}` } })
        .then(res => res.json())
        .then(data => {
            document.getElementById('lblCounter').innerText = `${data.total} / 3`;
            const container = document.getElementById('cardsContainer');
            data.tarjetas.forEach(t => {
                container.innerHTML += `
                    <div class="visual-card">
                        <div style="display:flex; justify-content:space-between;"><b>KAZUMA CARD</b><img src="${t.avatar || ''}" width="40" height="40" style="border-radius:8px; border:1px solid #000;"></div>
                        <div class="card-number">${t.card_number}</div>
                        <div style="display:flex; justify-content:space-between;">
                            <div><small>TITULAR</small><br><b>${t.username_dueno}</b></div>
                            <div style="text-align:right;"><small>VENCE</small><br><b>${t.fecha_vencimiento}</b></div>
                        </div>
                    </div>`;
            });
        });
    </script>
</body>
</html>
